name: HashNode Global - Release AAB (Fixed)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-release:
    name: 🏗️ Build Signed AAB
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📝 Fix Config and Build
        run: |
          npm install
          # Paket adını zorla düzeltiyoruz
          echo '{"appId": "com.minersimstudio.hashnodeglobal", "appName": "Hashnode Global", "webDir": "www", "bundledWebRuntime": false}' > capacitor.config.json
          npx cap add android || true
          npx cap sync android

      - name: 🏗️ Build AAB
        run: |
          cd android
          ./gradlew bundleRelease

      - name: ✍️ Sign AAB
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: android/app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HashNode-V9-Fixed-AAB
          path: android/app/build/outputs/bundle/release/*.aab
