name: HashNode Global — Auto Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-release:
    name: 🏗️ Build Signed Release APK
    runs-on: ubuntu-latest

    steps:

      # ── 1. Kodu çek ──────────────────────────────────────
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # ── 2. Node.js ───────────────────────────────────────
      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. Java 17 ───────────────────────────────────────
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 4. Android SDK ───────────────────────────────────
      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. www klasörü + index.html (CAP ADD'DEN ÖNCE) ───
      #    webDir mevcut olmazsa cap add hata verir
      - name: 🌐 Create www folder and index.html FIRST
        run: |
          mkdir -p www
          if [ -f HASHNODE_GLOBAL_FINAL.html ]; then
            cp HASHNODE_GLOBAL_FINAL.html www/index.html
            echo "✅ HASHNODE_GLOBAL_FINAL.html kopyalandı"
          elif [ -f index.html ]; then
            cp index.html www/index.html
            echo "✅ index.html kopyalandı"
          else
            cat > www/index.html << 'EOF'
          <!DOCTYPE html><html><head><meta charset="UTF-8">
          <title>HashNode Global</title></head>
          <body><h1>HashNode Global</h1></body></html>
          EOF
            echo "⚠️ Placeholder www/index.html oluşturuldu"
          fi
          ls -la www/

      # ── 6. package.json oluştur ───────────────────────────
      - name: 📝 Create package.json
        run: |
          cat > package.json << 'EOF'
          {
            "name": "hashnode-global",
            "version": "9.0.0",
            "description": "HashNode Global Virtual Mining Simulator",
            "scripts": {
              "build": "echo Build OK"
            },
            "dependencies": {
              "@capacitor/core": "5.7.0",
              "@capacitor/android": "5.7.0"
            },
            "devDependencies": {
              "@capacitor/cli": "5.7.0"
            }
          }
          EOF
          echo "✅ package.json oluşturuldu"

      # ── 7. capacitor.config.json oluştur (webDir: www) ───
      - name: 📝 Create capacitor.config.json
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.hashnode.global",
            "appName": "HashNode Global",
            "webDir": "www"
          }
          EOF
          echo "✅ capacitor.config.json oluşturuldu (webDir: www)"

      # ── 8. npm install ────────────────────────────────────
      - name: 📦 Install dependencies
        run: npm install

      # ── 9. Android platformu ekle (www hazır olduğu için) ─
      - name: 🤖 Add Android platform
        run: |
          if [ ! -d android ]; then
            npx cap add android
            echo "✅ Android eklendi"
          else
            echo "✅ Android zaten var"
          fi

      # ── 10. assets klasörünü garantiye al ─────────────────
      - name: 📁 Ensure assets folder exists
        run: |
          mkdir -p android/app/src/main/assets
          echo "✅ assets klasörü hazır"

      # ── 11. Capacitor copy (web → android assets) ─────────
      - name: 📋 Capacitor copy
        run: npx cap copy android

      # ── 12. Capacitor update ──────────────────────────────
      - name: 🔄 Capacitor update
        run: npx cap update android

      # ── 13. Gradle izinleri ───────────────────────────────
      - name: 🔧 Make gradlew executable
        run: chmod +x android/gradlew

      # ── 14. Keystore otomatik oluştur ─────────────────────
      - name: 🔑 Auto-Generate Keystore
        run: |
          keytool -genkey -v \
            -keystore android/app/hashnode-release.keystore \
            -alias hashnode \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass HashnodeStore2024! \
            -keypass HashnodeKey2024! \
            -dname "CN=HashNode Global, OU=Mobile, O=HashNode, L=Istanbul, ST=Istanbul, C=TR"
          echo "✅ Keystore oluşturuldu"

      # ── 15. Signing config build.gradle'a ekle ────────────
      - name: 📝 Inject Signing Config
        run: |
          BUILD_GRADLE="android/app/build.gradle"
          if ! grep -q "HashNode Auto-Signing" "$BUILD_GRADLE"; then
            cat >> "$BUILD_GRADLE" << 'GRADLEEOF'

          // HashNode Auto-Signing
          android {
              signingConfigs {
                  release {
                      storeFile file("hashnode-release.keystore")
                      storePassword "HashnodeStore2024!"
                      keyAlias "hashnode"
                      keyPassword "HashnodeKey2024!"
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                      shrinkResources false
                  }
              }
          }
          GRADLEEOF
            echo "✅ Signing config eklendi"
          else
            echo "✅ Signing config zaten var"
          fi

      # ── 16. Release APK derle ─────────────────────────────
      - name: 🏗️ Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --stacktrace

      # ── 17. APK yeniden adlandır ──────────────────────────
      - name: ✏️ Rename APK
        run: |
          mkdir -p release-output
          APK=$(find android/app/build/outputs/apk/release/ -name "*.apk" | head -1)
          echo "Bulunan APK: $APK"
          cp "$APK" release-output/HashNode-V9-Release.apk
          ls -lh release-output/
          echo "✅ HashNode-V9-Release.apk hazır"

      # ── 18. İmzayı doğrula ───────────────────────────────
      - name: 🔍 Verify Signature
        run: |
          BUILD_TOOLS=$ANDROID_SDK_ROOT/build-tools/$(ls $ANDROID_SDK_ROOT/build-tools/ | sort -V | tail -1)
          $BUILD_TOOLS/apksigner verify --print-certs \
            release-output/HashNode-V9-Release.apk && \
          echo "✅ İmza doğrulandı — Google Play kabul edecek"

      # ── 19. Keystore artifact ─────────────────────────────
      - name: 💾 Upload Keystore Backup
        uses: actions/upload-artifact@v4
        with:
          name: HashNode-Keystore-Backup
          path: android/app/hashnode-release.keystore
          retention-days: 90

      # ── 20. Release APK artifact ──────────────────────────
      - name: 📤 Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: HashNode-V9-Release
          path: release-output/HashNode-V9-Release.apk
          retention-days: 30

      # ── 21. Özet ─────────────────────────────────────────
      - name: 📋 Summary
        run: |
          echo "======================================="
          echo "  ✅  HashNode Global v9 — BUILD OK"
          echo "======================================="
          echo "  APK  : HashNode-V9-Release.apk"
          echo "  Boyut: $(du -sh release-output/HashNode-V9-Release.apk | cut -f1)"
          echo "  İmza : Signed Release (Google Play OK)"
          echo "======================================="
