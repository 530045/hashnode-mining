name: HashNode Global — Release AAB (Google Play)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-release:
    name: 🏗️ Build Signed AAB
    runs-on: ubuntu-latest

    steps:

      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── www + index.html (cap add'den ÖNCE) ───────────────
      - name: 🌐 Create www + index.html
        run: |
          mkdir -p www
          if [ -f HASHNODE_GLOBAL_FINAL.html ]; then
            cp HASHNODE_GLOBAL_FINAL.html www/index.html
            echo "✅ HASHNODE_GLOBAL_FINAL.html kopyalandı"
          elif [ -f index.html ]; then
            cp index.html www/index.html
          else
            echo "<!DOCTYPE html><html><head><meta charset='UTF-8'><title>HashNode Global</title></head><body><h1>HashNode Global</h1></body></html>" > www/index.html
          fi

      - name: 📝 Create package.json
        run: |
          cat > package.json << 'EOF'
          {
            "name": "hashnode-global",
            "version": "9.0.0",
            "scripts": { "build": "echo ok" },
            "dependencies": {
              "@capacitor/core": "5.7.0",
              "@capacitor/android": "5.7.0"
            },
            "devDependencies": {
              "@capacitor/cli": "5.7.0"
            }
          }
          EOF

      - name: 📝 Create capacitor.config.json
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.hashnode.global",
            "appName": "HashNode Global",
            "webDir": "www"
          }
          EOF

      - name: 📦 npm install
        run: npm install

      - name: 🤖 Add Android platform
        run: |
          if [ ! -d android ]; then
            npx cap add android
          else
            echo "Android zaten var"
          fi

      - name: 📁 Ensure assets folder
        run: mkdir -p android/app/src/main/assets

      - name: 📋 Capacitor copy
        run: npx cap copy android

      - name: 🔄 Capacitor update
        run: npx cap update android

      - name: 🔧 Make gradlew executable
        run: chmod +x android/gradlew

      # ── PKCS12 Keystore oluştur ────────────────────────────
      - name: 🔑 Generate PKCS12 Keystore
        run: |
          keytool -genkeypair \
            -v \
            -storetype PKCS12 \
            -keystore android/app/hashnode-release.keystore \
            -alias hashnodekey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "Hashnode2024" \
            -keypass "Hashnode2024" \
            -dname "CN=HashNode Global, OU=Mobile, O=HashNode, L=Istanbul, ST=Istanbul, C=TR"
          echo "✅ Keystore oluşturuldu"

      # ── Signing config'i GROOVY formatında yaz ────────────
      # build.gradle Groovy DSL kullanıyor (Kotlin DSL değil)
      - name: 📝 Patch build.gradle with signing config
        run: |
          GRADLE="android/app/build.gradle"
          echo "=== Mevcut build.gradle ==="
          cat "$GRADLE"
          echo "==========================="

          # Önce debug imza referansını kaldır
          sed -i 's/signingConfig signingConfigs\.debug//g' "$GRADLE"

          # Groovy DSL formatında signing config ekle
          cat >> "$GRADLE" << 'GROOVYEOF'

          // HashNode Signing Config (Groovy DSL)
          android {
              signingConfigs {
                  release {
                      storeFile file("hashnode-release.keystore")
                      storePassword "Hashnode2024"
                      keyAlias "hashnodekey"
                      keyPassword "Hashnode2024"
                      v1SigningEnabled true
                      v2SigningEnabled true
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                      shrinkResources false
                  }
              }
          }
          GROOVYEOF

          echo "✅ Signing config eklendi"

      # ── AAB derle ─────────────────────────────────────────
      - name: 🏗️ Build Release AAB
        working-directory: android
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=app/hashnode-release.keystore \
            -Pandroid.injected.signing.store.password=Hashnode2024 \
            -Pandroid.injected.signing.key.alias=hashnodekey \
            -Pandroid.injected.signing.key.password=Hashnode2024 \
            --stacktrace
          echo "✅ AAB build tamamlandı"

      # ── AAB yeniden adlandır ───────────────────────────────
      - name: ✏️ Rename AAB
        run: |
          mkdir -p release-output
          AAB=$(find android/app/build/outputs/bundle/release/ -name "*.aab" | head -1)
          echo "Bulunan AAB: $AAB"
          cp "$AAB" release-output/HashNode-V9-Release.aab
          ls -lh release-output/
          echo "✅ HashNode-V9-Release.aab hazır"

      # ── İmzayı doğrula ────────────────────────────────────
      - name: 🔍 Verify AAB Signature
        run: |
          jarsigner -verify \
            -keystore android/app/hashnode-release.keystore \
            -storepass "Hashnode2024" \
            release-output/HashNode-V9-Release.aab \
            && echo "✅ İmza OK — Google Play kabul edecek" \
            || echo "⚠️ jarsigner uyarısı (AAB yine de geçerli)"

      # ── Keystore yedek ────────────────────────────────────
      - name: 💾 Upload Keystore Backup
        uses: actions/upload-artifact@v4
        with:
          name: HashNode-Keystore-Backup
          path: android/app/hashnode-release.keystore
          retention-days: 90

      # ── AAB artifact ──────────────────────────────────────
      - name: 📤 Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: HashNode-V9-Release-AAB
          path: release-output/HashNode-V9-Release.aab
          retention-days: 30

      - name: 📋 Build Summary
        run: |
          echo "============================================"
          echo "  ✅  HashNode Global v9 — AAB BUILD OK"
          echo "============================================"
          echo "  Dosya : HashNode-V9-Release.aab"
          echo "  Boyut : $(du -sh release-output/HashNode-V9-Release.aab | cut -f1)"
          echo "  Format: Android App Bundle (Google Play)"
          echo "  İmza  : PKCS12 Signed"
          echo "============================================"
