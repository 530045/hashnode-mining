name: HashNode Global — Release AAB (Google Play)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-release:
    name: 🏗️ Build Signed AAB
    runs-on: ubuntu-latest

    steps:

      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 🌐 Create www + index.html
        run: |
          mkdir -p www
          if [ -f HASHNODE_GLOBAL_FINAL.html ]; then
            cp HASHNODE_GLOBAL_FINAL.html www/index.html
          elif [ -f index.html ]; then
            cp index.html www/index.html
          else
            echo "<!DOCTYPE html><html><head><meta charset='UTF-8'><title>HashNode Global</title></head><body><h1>HashNode Global</h1></body></html>" > www/index.html
          fi

      - name: 📝 Create package.json
        run: |
          cat > package.json << 'EOF'
          {
            "name": "hashnode-global",
            "version": "9.0.0",
            "scripts": { "build": "echo ok" },
            "dependencies": {
              "@capacitor/core": "5.5.1",
              "@capacitor/android": "5.5.1"
            },
            "devDependencies": {
              "@capacitor/cli": "5.5.1"
            }
          }
          EOF

      - name: 📝 Create capacitor.config.json
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.minersimstudio.hashnodeglobal",
            "appName": "HashNode Global",
            "webDir": "www"
          }
          EOF

      - name: 📦 npm install
        run: npm install

      - name: 🤖 Add Android platform
        run: |
          if [ ! -d android ]; then
            npx cap add android
          else
            echo "Android zaten var"
          fi

      - name: 📁 Ensure assets folder
        run: mkdir -p android/app/src/main/assets

      - name: 📋 Capacitor copy
        run: npx cap copy android

      - name: 🔄 Capacitor update
        run: npx cap update android

      - name: 🔧 Make gradlew executable
        run: chmod +x android/gradlew

      # AGP 8.0 → 8.2 yükselt (compileSdk 34 destekler)
      - name: ⬆️ Upgrade Android Gradle Plugin
        run: |
          # build.gradle sürümünü güncelle
          sed -i "s/com.android.tools.build:gradle:[0-9.]*/com.android.tools.build:gradle:8.2.2/" android/build.gradle || true
          # gradle-wrapper.properties'i güncelle
          sed -i "s|gradle-[0-9.]*-all.zip|gradle-8.2.1-all.zip|" android/gradle/wrapper/gradle-wrapper.properties || true
          sed -i "s|gradle-[0-9.]*-bin.zip|gradle-8.2.1-all.zip|" android/gradle/wrapper/gradle-wrapper.properties || true
          echo "=== gradle-wrapper.properties ==="
          cat android/gradle/wrapper/gradle-wrapper.properties || true
          echo "=== android/build.gradle ==="
          cat android/build.gradle || true

      # ── KRİTİK: build.gradle'ı tamamen yeniden yaz ────────
      # rootProject null hatası Capacitor'ın ürettiği 3-5. satırlardan
      # geliyor. Dosyayı sıfırdan yazarak bu sorunu ortadan kaldırıyoruz.
      - name: 📝 Rewrite build.gradle from scratch
        run: |
          KEYSTORE="$GITHUB_WORKSPACE/hashnode-release.keystore"
          RUN_NUMBER=${{ github.run_number }}

          cat > android/app/build.gradle << GRADLEOF
          apply plugin: 'com.android.application'

          android {
              namespace 'com.minersimstudio.hashnodeglobal'
              compileSdkVersion 34
              defaultConfig {
                  applicationId "com.minersimstudio.hashnodeglobal"
                  minSdkVersion 22
                  targetSdkVersion 34
                  versionCode $RUN_NUMBER
                  versionName "1.0.0"
              }
              signingConfigs {
                  release {
                      storeFile file("$KEYSTORE")
                      storePassword "Hashnode2024"
                      keyAlias "hashnodekey"
                      keyPassword "Hashnode2024"
                      v1SigningEnabled true
                      v2SigningEnabled true
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                      shrinkResources false
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }

          repositories {
              google()
              mavenCentral()
          }

          dependencies {
              implementation project(':capacitor-android')
              implementation project(':capacitor-cordova-android-plugins')
              implementation fileTree(dir: 'libs', include: ['*.jar'])
          }
          GRADLEOF

          echo "✅ build.gradle yeniden yazıldı"
          cat android/app/build.gradle

      # ── Splash screen ve eksik kaynakları oluştur ───────────
      - name: 🎨 Create missing Android resources
        run: |
          # styles.xml
          mkdir -p android/app/src/main/res/values
          cat > android/app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="colorPrimary">@color/colorPrimary</item>
                  <item name="colorPrimaryDark">@color/colorPrimaryDark</item>
                  <item name="colorAccent">@color/colorAccent</item>
              </style>
              <style name="Theme.SplashScreen" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="android:windowBackground">@color/colorPrimary</item>
              </style>
          </resources>
          EOF

          # colors.xml
          cat > android/app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#00ff88</color>
              <color name="colorPrimaryDark">#00cc66</color>
              <color name="colorAccent">#0ff</color>
          </resources>
          EOF

          echo "✅ styles.xml ve colors.xml oluşturuldu"

      # ── Keystore kontrol ──────────────────────────────────
      - name: 🔑 Setup Keystore
        run: |
          if [ -f "$GITHUB_WORKSPACE/hashnode-release.keystore" ]; then
            echo "✅ Repodaki keystore kullanılıyor"
            ls -lh "$GITHUB_WORKSPACE/hashnode-release.keystore"
          else
            echo "⚠️ Keystore yok, oluşturuluyor..."
            keytool -genkeypair \
              -v \
              -storetype PKCS12 \
              -keystore "$GITHUB_WORKSPACE/hashnode-release.keystore" \
              -alias hashnodekey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass "Hashnode2024" \
              -keypass "Hashnode2024" \
              -dname "CN=HashNode Global, OU=Mobile, O=HashNode, L=Istanbul, ST=Istanbul, C=TR"
            ls -lh "$GITHUB_WORKSPACE/hashnode-release.keystore"
          fi

      # ── AAB derle ─────────────────────────────────────────
      - name: 🏗️ Build Release AAB
        working-directory: android
        run: |
          ./gradlew bundleRelease --stacktrace
          echo "✅ AAB build tamamlandı"

      - name: ✏️ Rename AAB
        run: |
          mkdir -p release-output
          AAB=$(find android/app/build/outputs/bundle/release/ -name "*.aab" | head -1)
          echo "Bulunan AAB: $AAB"
          cp "$AAB" release-output/HashNode-V9-Release.aab
          ls -lh release-output/

      - name: 💾 Upload Keystore Backup
        uses: actions/upload-artifact@v4
        with:
          name: HashNode-Keystore-Backup
          path: ${{ github.workspace }}/hashnode-release.keystore
          retention-days: 90

      - name: 📤 Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: HashNode-V9-Release-AAB
          path: release-output/HashNode-V9-Release.aab
          retention-days: 30

      - name: 📋 Build Summary
        run: |
          echo "============================================"
          echo "  ✅  HashNode Global v9 — AAB BUILD OK"
          echo "============================================"
          echo "  Dosya  : HashNode-V9-Release.aab"
          echo "  Boyut  : $(du -sh release-output/HashNode-V9-Release.aab | cut -f1)"
          echo "  vCode  : ${{ github.run_number }}"
          echo "  SDK    : targetSdk 35"
          echo "  Paket  : com.minersimstudio.hashnodeglobal"
          echo "============================================"
