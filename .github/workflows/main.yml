name: HashNode Global Final Victory

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Fix Everything
        run: |
          npm install
          mkdir -p www
          cp index.html www/ 2>/dev/null || echo "<html><body>Hashnode Global</body></html>" > www/index.html
          echo '{"appId": "com.minersimstudio.hashnodeglobal", "appName": "Hashnode Global", "webDir": "www", "bundledWebRuntime": false}' > capacitor.config.json
          npx cap add android || true
          npx cap sync android

      - name: Build AAB
        run: |
          cd android
          ./gradlew bundleRelease

      - name: Sign AAB (Manual Fix)
        run: |
          # Bu kısım o "Tag number" hatasını çözen manuel imzalamadır
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > release.jks
          jarsigner -keystore release.jks -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" -keypass "${{ secrets.ANDROID_KEY_PASSWORD }}" android/app/build/outputs/bundle/release/app-release.aab "${{ secrets.ANDROID_KEY_ALIAS }}"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: HashNode-Final-AAB
          path: android/app/build/outputs/bundle/release/*.aab
