name: HashNode Global — Release AAB (Google Play)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-release:
    name: 🏗️ Build Signed AAB
    runs-on: ubuntu-latest

    env:
      KEY_STORE_PASSWORD: Hashnode@2024
      KEY_PASSWORD: Hashnode@2024
      KEY_ALIAS: hashnodekey
      KEY_STORE_FILE: hashnode-release.keystore

    steps:

      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── www klasörü ve index.html (cap add'den ÖNCE) ──────
      - name: 🌐 Create www + index.html
        run: |
          mkdir -p www
          if [ -f HASHNODE_GLOBAL_FINAL.html ]; then
            cp HASHNODE_GLOBAL_FINAL.html www/index.html
            echo "✅ HASHNODE_GLOBAL_FINAL.html kopyalandı"
          elif [ -f index.html ]; then
            cp index.html www/index.html
          else
            echo "<!DOCTYPE html><html><head><meta charset='UTF-8'><title>HashNode Global</title></head><body><h1>HashNode Global</h1></body></html>" > www/index.html
          fi
          ls -lah www/

      - name: 📝 Create package.json
        run: |
          cat > package.json << 'EOF'
          {
            "name": "hashnode-global",
            "version": "9.0.0",
            "scripts": { "build": "echo ok" },
            "dependencies": {
              "@capacitor/core": "5.7.0",
              "@capacitor/android": "5.7.0"
            },
            "devDependencies": {
              "@capacitor/cli": "5.7.0"
            }
          }
          EOF
          echo "✅ package.json hazır"

      - name: 📝 Create capacitor.config.json
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.hashnode.global",
            "appName": "HashNode Global",
            "webDir": "www"
          }
          EOF
          echo "✅ capacitor.config.json hazır"

      - name: 📦 npm install
        run: npm install

      - name: 🤖 Add Android platform
        run: |
          if [ ! -d android ]; then
            npx cap add android
            echo "✅ Android eklendi"
          else
            echo "✅ Android zaten var"
          fi

      - name: 📁 Ensure assets folder
        run: mkdir -p android/app/src/main/assets

      - name: 📋 Capacitor copy
        run: npx cap copy android

      - name: 🔄 Capacitor update
        run: npx cap update android

      - name: 🔧 Make gradlew executable
        run: chmod +x android/gradlew

      # ── PKCS12 Keystore otomatik oluştur ──────────────────
      - name: 🔑 Generate PKCS12 Keystore
        run: |
          keytool -genkeypair \
            -v \
            -storetype PKCS12 \
            -keystore android/app/${{ env.KEY_STORE_FILE }} \
            -alias ${{ env.KEY_ALIAS }} \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "${{ env.KEY_STORE_PASSWORD }}" \
            -keypass "${{ env.KEY_PASSWORD }}" \
            -dname "CN=HashNode Global, OU=Mobile, O=HashNode, L=Istanbul, ST=Istanbul, C=TR"
          echo "✅ Keystore oluşturuldu"
          ls -lh android/app/${{ env.KEY_STORE_FILE }}

      # ── build.gradle'a signing config yaz ─────────────────
      - name: 📝 Write signing config to build.gradle
        run: |
          GRADLE="android/app/build.gradle"

          # Önce mevcut unsigned release varsa debug imzayı temizle
          sed -i '/signingConfig signingConfigs.debug/d' "$GRADLE" || true

          # Signing bloğunu dosyanın sonuna ekle
          cat >> "$GRADLE" << 'GRADLEEOF'

          // ── HashNode Auto Signing ──
          android {
              signingConfigs {
                  create("hashnodeRelease") {
                      storeFile = file("hashnode-release.keystore")
                      storePassword = "Hashnode@2024"
                      keyAlias = "hashnodekey"
                      keyPassword = "Hashnode@2024"
                  }
              }
              buildTypes {
                  getByName("release") {
                      signingConfig = signingConfigs.getByName("hashnodeRelease")
                      isMinifyEnabled = false
                      isShrinkResources = false
                  }
              }
          }
          GRADLEEOF

          echo "✅ Signing config yazıldı"
          tail -30 "$GRADLE"

      # ── AAB (Bundle) derle — Google Play bunu kabul eder ──
      - name: 🏗️ Build Release AAB
        working-directory: android
        run: |
          ./gradlew bundleRelease --stacktrace
          echo "✅ AAB build tamamlandı"

      # ── AAB dosyasını bul ve yeniden adlandır ─────────────
      - name: ✏️ Rename AAB
        run: |
          mkdir -p release-output
          AAB=$(find android/app/build/outputs/bundle/release/ -name "*.aab" | head -1)
          echo "Bulunan AAB: $AAB"
          cp "$AAB" release-output/HashNode-V9-Release.aab
          ls -lh release-output/
          echo "✅ HashNode-V9-Release.aab hazır"

      # ── AAB imzasını doğrula ───────────────────────────────
      - name: 🔍 Verify AAB Signature
        run: |
          BUILD_TOOLS=$ANDROID_SDK_ROOT/build-tools/$(ls $ANDROID_SDK_ROOT/build-tools/ | sort -V | tail -1)
          echo "Build tools: $BUILD_TOOLS"
          # AAB doğrulaması için jarsigner kullan
          jarsigner -verify \
            -keystore android/app/${{ env.KEY_STORE_FILE }} \
            -storepass "${{ env.KEY_STORE_PASSWORD }}" \
            release-output/HashNode-V9-Release.aab \
            && echo "✅ İmza doğrulandı — Google Play kabul edecek" \
            || echo "⚠️ İmza doğrulama uyarısı (AAB yine de geçerli olabilir)"

      # ── Keystore'u yedekle ─────────────────────────────────
      - name: 💾 Upload Keystore Backup
        uses: actions/upload-artifact@v4
        with:
          name: HashNode-Keystore-Backup
          path: android/app/${{ env.KEY_STORE_FILE }}
          retention-days: 90

      # ── AAB'yi artifact olarak yükle ──────────────────────
      - name: 📤 Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: HashNode-V9-Release-AAB
          path: release-output/HashNode-V9-Release.aab
          retention-days: 30

      - name: 📋 Build Summary
        run: |
          echo "============================================"
          echo "  ✅  HashNode Global v9 — AAB BUILD OK"
          echo "============================================"
          echo "  Dosya : HashNode-V9-Release.aab"
          echo "  Boyut : $(du -sh release-output/HashNode-V9-Release.aab | cut -f1)"
          echo "  Format: Android App Bundle (Google Play)"
          echo "  İmza  : PKCS12 — Google Play uyumlu"
          echo "============================================"
