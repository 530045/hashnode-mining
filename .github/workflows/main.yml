name: Build Release AAB
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          mkdir -p www
          # Eğer ana dizinde index.html varsa onu www içine kopyala
          [ -f index.html ] && cp index.html www/index.html || echo "index.html not found, using placeholder"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configure and Build AAB
        run: |
          # webDir hatasını çözmek için dizini zorla tanımlıyoruz
          npx cap add android || true
          sed -i 's/"webDir": "."/"webDir": "www"/' capacitor.config.json || true
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Prepare AAB File
        run: |
          mv android/app/build/outputs/bundle/release/app-release-unsigned.aab HashNode-V9.aab

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HashNode-V9-Bundle
          path: HashNode-V9.aab
