name: HashNode Global Fixed

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Fix Directories and Config
        run: |
          npm install
          # WWW klasörü yoksa oluştur ve içini doldur
          mkdir -p www
          cp index.html www/ 2>/dev/null || echo "<html><body>Hashnode Global</body></html>" > www/index.html
          # Paket adını zorla ayarla
          echo '{"appId": "com.minersimstudio.hashnodeglobal", "appName": "Hashnode Global", "webDir": "www", "bundledWebRuntime": false}' > capacitor.config.json
          npx cap add android || true
          npx cap sync android

      - name: Build AAB
        run: |
          cd android
          ./gradlew bundleRelease

      - name: Sign App Bundle
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: android/app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: HashNode-Final-AAB
          path: android/app/build/outputs/bundle/release/*.aab
