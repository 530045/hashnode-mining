name: HashNode Global — Auto Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-release:
    name: 🏗️ Build Signed Release APK
    runs-on: ubuntu-latest

    steps:

      # ── 1. Kodu çek ──────────────────────────────────────
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # ── 2. Node.js (cache OLMADAN — package-lock.json gerekmez) ──
      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. Java 17 ───────────────────────────────────────
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 4. Android SDK ───────────────────────────────────
      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. package.json yoksa oluştur ────────────────────
      - name: 📝 Create package.json if missing
        run: |
          if [ ! -f package.json ]; then
            cat > package.json << 'EOF'
          {
            "name": "hashnode-global",
            "version": "9.0.0",
            "description": "HashNode Global Virtual Mining Simulator",
            "scripts": {
              "build": "echo Build OK"
            },
            "dependencies": {
              "@capacitor/core": "^5.7.0",
              "@capacitor/android": "^5.7.0",
              "@capacitor-community/admob": "^5.0.0"
            },
            "devDependencies": {
              "@capacitor/cli": "^5.7.0"
            }
          }
          EOF
            echo "✅ package.json oluşturuldu"
          else
            echo "✅ package.json zaten var"
          fi

      # ── 6. capacitor.config.json yoksa oluştur ───────────
      - name: 📝 Create capacitor.config.json if missing
        run: |
          if [ ! -f capacitor.config.json ]; then
            cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.hashnode.global",
            "appName": "HashNode Global",
            "webDir": "www",
            "plugins": {
              "AdMob": {
                "appId": "ca-app-pub-3940256099942544~3347511713",
                "isTesting": false
              }
            }
          }
          EOF
            echo "✅ capacitor.config.json oluşturuldu"
          fi

      # ── 7. npm install (ci değil — lock file gerekmez) ───
      - name: 📦 Install dependencies
        run: npm install

      # ── 8. Web dosyalarını hazırla ────────────────────────
      - name: 🌐 Prepare web assets
        run: |
          mkdir -p www
          if [ -f HASHNODE_GLOBAL_FINAL.html ]; then
            cp HASHNODE_GLOBAL_FINAL.html www/index.html
            echo "✅ HASHNODE_GLOBAL_FINAL.html → www/index.html"
          elif [ -f index.html ]; then
            cp index.html www/index.html
            echo "✅ index.html → www/index.html"
          else
            echo "<h1>HashNode Global</h1>" > www/index.html
            echo "⚠️ Placeholder index.html oluşturuldu"
          fi

      # ── 9. Android platformu yoksa ekle ──────────────────
      - name: 🤖 Add Android platform if missing
        run: |
          if [ ! -d android ]; then
            npx cap add android
            echo "✅ Android platformu eklendi"
          else
            echo "✅ Android platformu zaten var"
          fi

      # ── 10. Capacitor sync ───────────────────────────────
      - name: 🔄 Capacitor sync
        run: npx cap sync android

      # ── 11. Gradle izinleri ──────────────────────────────
      - name: 🔧 Make gradlew executable
        run: chmod +x android/gradlew

      # ── 12. Keystore'u otomatik oluştur ──────────────────
      - name: 🔑 Auto-Generate Keystore
        run: |
          keytool -genkey -v \
            -keystore android/app/hashnode-release.keystore \
            -alias hashnode \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass HashnodeStore2024! \
            -keypass HashnodeKey2024! \
            -dname "CN=HashNode Global, OU=Mobile, O=HashNode, L=Istanbul, ST=Istanbul, C=TR"
          echo "✅ Keystore oluşturuldu"

      # ── 13. Signing config'i build.gradle'a ekle ─────────
      - name: 📝 Inject Signing Config
        run: |
          BUILD_GRADLE="android/app/build.gradle"
          # Daha önce eklenmemişse ekle
          if ! grep -q "HashNode Auto-Signing" "$BUILD_GRADLE"; then
            cat >> "$BUILD_GRADLE" << 'GRADLEEOF'

          // HashNode Auto-Signing
          android {
              signingConfigs {
                  release {
                      storeFile file("hashnode-release.keystore")
                      storePassword "HashnodeStore2024!"
                      keyAlias "hashnode"
                      keyPassword "HashnodeKey2024!"
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                      shrinkResources false
                  }
              }
          }
          GRADLEEOF
            echo "✅ Signing config eklendi"
          else
            echo "✅ Signing config zaten var"
          fi

      # ── 14. Release APK derle ────────────────────────────
      - name: 🏗️ Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --stacktrace

      # ── 15. APK'yı bul ve yeniden adlandır ───────────────
      - name: ✏️ Rename APK
        run: |
          mkdir -p release-output
          APK=$(find android/app/build/outputs/apk/release/ -name "*.apk" | head -1)
          echo "Bulunan APK: $APK"
          cp "$APK" release-output/HashNode-V9-Release.apk
          ls -lh release-output/
          echo "✅ HashNode-V9-Release.apk hazır"

      # ── 16. İmzayı doğrula ───────────────────────────────
      - name: 🔍 Verify Signature
        run: |
          BUILD_TOOLS=$ANDROID_SDK_ROOT/build-tools/$(ls $ANDROID_SDK_ROOT/build-tools/ | sort -V | tail -1)
          $BUILD_TOOLS/apksigner verify --print-certs \
            release-output/HashNode-V9-Release.apk && \
            echo "✅ İmza doğrulandı — Google Play kabul edecek"

      # ── 17. Keystore artifact ────────────────────────────
      - name: 💾 Upload Keystore Backup
        uses: actions/upload-artifact@v4
        with:
          name: HashNode-Keystore-Backup
          path: android/app/hashnode-release.keystore
          retention-days: 90

      # ── 18. Release APK artifact ─────────────────────────
      - name: 📤 Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: HashNode-V9-Release
          path: release-output/HashNode-V9-Release.apk
          retention-days: 30

      # ── 19. Özet ─────────────────────────────────────────
      - name: 📋 Summary
        run: |
          echo "======================================="
          echo "  ✅  HashNode Global v9 — BUILD OK"
          echo "======================================="
          echo "  APK  : HashNode-V9-Release.apk"
          echo "  Boyut: $(du -sh release-output/HashNode-V9-Release.apk | cut -f1)"
          echo "  İmza : Signed Release (Google Play OK)"
          echo "======================================="
