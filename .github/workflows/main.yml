name: Build Release AAB
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          mkdir -p www
          [ -f index.html ] && cp index.html www/index.html || echo "index.html not found"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build AAB
        run: |
          npx cap add android || true
          sed -i 's/"webDir": "."/"webDir": "www"/' capacitor.config.json || true
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease
          # Dosyayı kolay bulabilmek için ana dizine kopyalıyoruz
          cp app/build/outputs/bundle/release/*.aab ../HashNode-V9.aab

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HashNode-V9-Final-AAB
          path: HashNode-V9.aab
